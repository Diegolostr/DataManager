services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: unity
      POSTGRES_PASSWORD: unity
      POSTGRES_DB: unitydata
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build:
      context: ./UnityDataImporter
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_CONN: "Host=host.docker.internal;Port=5432;Database=datamanager;Username=mvpuser;Password=mvpuser"
      API_KEY: "14a53ef987175d2e4641d8e43ea93620"
    depends_on:
      - db

volumes:
  pgdata:
