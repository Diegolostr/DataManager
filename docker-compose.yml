services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: unity
      POSTGRES_PASSWORD: unity
      POSTGRES_DB: unitydata
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build:
      context: ./UnityDataImporter
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_CONN: "Host=db;Port=5432;Database=unitydata;Username=unity;Password=unity"
      API_KEY: ""
    depends_on:
      - db

volumes:
  pgdata:
