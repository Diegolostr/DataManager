services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: mvpuser
      POSTGRES_PASSWORD: mvpuser
      POSTGRES_DB: datamanager
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build:
      context: ./UnityDataImporter
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8443:8443"
    environment:
      DB_CONN: "Host=db;Port=5432;Database=datamanager;Username=mvpuser;Password=mvpuser"
      API_KEY: "14a53ef987175d2e4641d8e43ea93620"
      ASPNETCORE_URLS: "http://+:8080;https://+:8443"
      ASPNETCORE_Kestrel__Certificates__Default__Path: "/certs/unity-datamanager.tailfff421.ts.net.crt"
      ASPNETCORE_Kestrel__Certificates__Default__KeyPath: "/certs/unity-datamanager.tailfff421.ts.net.key"
    volumes:
      - ./certs:/certs:ro
    depends_on:
      - db

volumes:
  pgdata:
